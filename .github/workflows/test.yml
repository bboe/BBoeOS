name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          key: apt-nasm-qemu-${{ runner.os }}
          path: ~/apt-cache
      - name: Install dependencies
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y nasm qemu-system-x86
          mkdir -p ~/apt-cache && cp /var/cache/apt/archives/*.deb ~/apt-cache/
      - name: Run ${{ matrix.suite }}
        run: python3 ./${{ matrix.suite }}.py
    strategy:
      fail-fast: false
      matrix:
        suite: [test_asm, test_fs, test_programs]
