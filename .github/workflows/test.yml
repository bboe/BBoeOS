name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    env:
      BBOE_ASM_SELF_HOST_TIMEOUT: 32
      BBOE_BOOT_TIMEOUT: 30
      BBOE_DOUBLY_INDIRECT_TIMEOUT: 60
      BBOE_FS_COMMAND_TIMEOUT: 30
      BBOE_LARGE_FILE_TIMEOUT: 30
      BBOE_PROGRAM_TIMEOUT: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        if: matrix.suite != 'test_cc_compatibility'
        with:
          key: apt-nasm-qemu-e2fsprogs-${{ runner.os }}
          path: ~/apt-cache
      - name: Install build dependencies
        if: matrix.suite != 'test_cc_compatibility'
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y e2fsprogs nasm qemu-system-x86
          mkdir -p ~/apt-cache && cp /var/cache/apt/archives/*.deb ~/apt-cache/
      - name: Install pytest
        if: matrix.suite == 'test_unit'
        run: pip install pytest
      - name: Run ${{ matrix.suite }}
        run: ${{ matrix.command }}
    strategy:
      fail-fast: false
      matrix:
        # test_programs_ext2 first so the longest job starts dispatching ahead of the others.
        include:
          - suite: test_programs_ext2
            command: python3 tests/test_programs.py --filesystem ext2 --slow
          - suite: test_archive
            command: python3 tests/test_archive.py
          - suite: test_asm
            command: python3 tests/test_asm.py
          - suite: test_bboefs
            command: python3 tests/test_bboefs.py
          - suite: test_cc_compatibility
            command: python3 tests/test_cc_compatibility.py
          - suite: test_draw
            command: python3 tests/test_draw.py
          - suite: test_floppy_boot
            command: python3 tests/test_floppy_boot.py
          - suite: test_programs_bbfs
            command: python3 tests/test_programs.py
          - suite: test_programs_floppy
            command: python3 tests/test_programs.py --floppy
          - suite: test_unit
            command: python3 -m pytest tests/unit/
