name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BBOE_ASM_SELF_HOST_TIMEOUT: 32
      BBOE_BOOT_TIMEOUT: 30
      BBOE_DOUBLY_INDIRECT_TIMEOUT: 60
      BBOE_FS_COMMAND_TIMEOUT: 30
      BBOE_LARGE_FILE_TIMEOUT: 30
      BBOE_PROGRAM_TIMEOUT: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        if: matrix.suite != 'test_cc'
        with:
          key: apt-nasm-qemu-e2fsprogs-${{ runner.os }}
          path: ~/apt-cache
      - name: Install dependencies
        if: matrix.suite != 'test_cc'
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y e2fsprogs nasm qemu-system-x86
          mkdir -p ~/apt-cache && cp /var/cache/apt/archives/*.deb ~/apt-cache/
      - name: Run ${{ matrix.suite }}
        run: python3 tests/${{ matrix.suite }}.py ${{ matrix.extra_args }}
    strategy:
      fail-fast: false
      matrix:
        # test_ext2 first so the longest job starts dispatching ahead of the others.
        suite: [test_ext2, test_archive, test_asm, test_bboefs, test_cc, test_draw, test_floppy_boot, test_programs]
        include:
          - suite: test_ext2
            extra_args: --slow
