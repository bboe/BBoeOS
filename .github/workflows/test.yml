name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.event.after }}"
          fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base_sha" "$head_sha")
          docs_only=true
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              docs/*|*.md) ;;
              *) docs_only=false; break ;;
            esac
          done <<< "$changed"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    env:
      BBOE_ASM_SELF_HOST_TIMEOUT: 32
      BBOE_BOOT_TIMEOUT: 30
      BBOE_DOUBLY_INDIRECT_TIMEOUT: 60
      BBOE_FS_COMMAND_TIMEOUT: 30
      BBOE_LARGE_FILE_TIMEOUT: 30
      BBOE_PROGRAM_TIMEOUT: 10
    steps:
      # Each suite must run (not be skipped at the job level) so the matrix
      # expands and posts a status check matching its required-checks name on
      # main's branch protection. On documentation-only PRs every step below
      # is gated to no-op, leaving the suite as a quick passing check.
      - name: Note docs-only no-op
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; ${{ matrix.suite }} marked passing without running."
      - uses: actions/checkout@v6
        if: needs.changes.outputs.docs_only != 'true'
      - uses: actions/setup-python@v6
        if: needs.changes.outputs.docs_only != 'true'
        with:
          python-version: '3.13'
      - uses: actions/cache@v5
        if: needs.changes.outputs.docs_only != 'true' && matrix.suite != 'test_cc_compatibility' && matrix.suite != 'test_kernel_archive' && matrix.suite != 'lint_no_raw_syscalls'
        with:
          key: apt-nasm-qemu-e2fsprogs-${{ runner.os }}
          path: ~/apt-cache
      - name: Install build dependencies
        if: needs.changes.outputs.docs_only != 'true' && matrix.suite != 'test_cc_compatibility' && matrix.suite != 'test_kernel_archive' && matrix.suite != 'lint_no_raw_syscalls'
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y e2fsprogs nasm qemu-system-x86
          mkdir -p ~/apt-cache && cp /var/cache/apt/archives/*.deb ~/apt-cache/
      - name: Install pytest
        if: needs.changes.outputs.docs_only != 'true' && (matrix.suite == 'test_unit' || matrix.suite == 'test_pipeline')
        run: pip install pytest
      - name: Run ${{ matrix.suite }}
        if: needs.changes.outputs.docs_only != 'true'
        run: ${{ matrix.command }}
    strategy:
      fail-fast: false
      matrix:
        # The two longest jobs (test_programs_ext2 and test_programs_bbfs, both
        # running with --slow) lead the matrix so they start dispatching ahead
        # of the shorter ones.
        include:
          - suite: test_programs_ext2
            command: python3 tests/test_programs.py --filesystem ext2 --slow
          - suite: test_programs_bbfs
            command: python3 tests/test_programs.py --slow
          - suite: test_archive
            command: python3 tests/test_archive.py
          - suite: test_asm
            command: python3 tests/test_asm.py
          - suite: test_bboefs
            command: python3 tests/test_bboefs.py
          - suite: test_cc_bits
            command: python3 tests/test_cc_bits.py
          - suite: test_cc_compatibility
            command: python3 tests/test_cc_compatibility.py
          - suite: test_doom_music_qemu
            command: python3 tests/test_doom_music_qemu.py
          - suite: test_doom_sound_qemu
            command: python3 tests/test_doom_sound_qemu.py
          - suite: test_draw
            command: python3 tests/test_draw.py
          - suite: test_floppy_boot
            command: python3 tests/test_floppy_boot.py
          - suite: test_kernel_archive
            command: python3 tests/test_kernel_archive.py
          - suite: test_pipeline
            # All five tests/test_pipeline_*.py drivers were added in
            # ec3e75b4 (pipelines landing) but never wired into CI.
            # They exercise SYS_SYS_PIPELINE2 end-to-end (basic,
            # per-child args, early-close SIGPIPE, pool recycle,
            # invalid-pipeline rejection).  Unlike test_programs.py,
            # the pytest drivers don't run make_os.sh internally —
            # they just open drive.img directly via run_qemu.py — so
            # the command builds the image first.
            command: ./make_os.sh && python3 -m pytest tests/test_pipeline_basic.py tests/test_pipeline_args.py tests/test_pipeline_early_close.py tests/test_pipeline_pool_recycle.py tests/test_pipeline_reject.py
          - suite: test_programs_floppy
            command: python3 tests/test_programs.py --floppy
          - suite: test_ps2
            command: python3 tests/test_ps2.py
          - suite: test_scrollback
            command: python3 tests/test_scrollback.py
          - suite: test_shell_chain
            command: python3 tests/test_shell_chain.py
          - suite: test_shell_history
            command: python3 tests/test_shell_history.py
          - suite: test_unit
            command: python3 -m pytest tests/unit/
          - suite: lint_no_raw_syscalls
            # Bare `int $0x30` outside tools/libc/ means a clang-compiled
            # caller is hardcoding a syscall number and will silently break
            # the next time the asm-side numbers in src/include/constants.asm
            # are renumbered (see PR #340 — Doom's hand-rolled DG_GetTicksMs
            # / DG_SleepMs invoked the wrong syscall for two months because
            # nobody updated the hex literal after PR #337's renumber).
            # Userland should call libc wrappers, which use the symbolic
            # SYS_* macros from the auto-generated tools/libc/include/syscalls.h.
            command: |
              matches=$(git grep -n 'int \$0x30' -- 'tools/' ':!tools/libc/syscall.c' ':!tools/libc/signal.c' || true)
              if [ -n "$matches" ]; then
                  echo "Bare INT 30h found outside tools/libc/{syscall,signal}.c — call a libc wrapper instead:"
                  echo "$matches"
                  exit 1
              fi
