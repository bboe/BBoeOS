name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        if: matrix.suite != 'test_cc'
        with:
          key: apt-nasm-qemu-e2fsprogs-${{ runner.os }}
          path: ~/apt-cache
      - name: Install dependencies
        if: matrix.suite != 'test_cc'
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y e2fsprogs nasm qemu-system-x86
          mkdir -p ~/apt-cache && cp /var/cache/apt/archives/*.deb ~/apt-cache/
      - name: Run ${{ matrix.suite }}
        run: python3 tests/${{ matrix.suite }}.py
    strategy:
      fail-fast: false
      matrix:
        suite: [test_archive, test_asm, test_bboefs, test_cc, test_draw, test_ext2, test_programs]
