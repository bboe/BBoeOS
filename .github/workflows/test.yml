name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.event.after }}"
          fi
          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base_sha" "$head_sha")
          docs_only=true
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              docs/*|*.md) ;;
              *) docs_only=false; break ;;
            esac
          done <<< "$changed"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    name: ${{ matrix.suite }}
    runs-on: ubuntu-latest
    env:
      BBOE_ASM_SELF_HOST_TIMEOUT: 32
      BBOE_BOOT_TIMEOUT: 30
      BBOE_DOUBLY_INDIRECT_TIMEOUT: 60
      BBOE_FS_COMMAND_TIMEOUT: 30
      BBOE_LARGE_FILE_TIMEOUT: 30
      BBOE_PROGRAM_TIMEOUT: 10
    steps:
      # Each suite must run (not be skipped at the job level) so the matrix
      # expands and posts a status check matching its required-checks name on
      # main's branch protection. On documentation-only PRs every step below
      # is gated to no-op, leaving the suite as a quick passing check.
      - name: Note docs-only no-op
        if: needs.changes.outputs.docs_only == 'true'
        run: echo "Docs-only change; ${{ matrix.suite }} marked passing without running."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.docs_only != 'true'
      - uses: actions/cache@v4
        if: needs.changes.outputs.docs_only != 'true' && matrix.suite != 'test_cc_compatibility' && matrix.suite != 'test_kernel_archive'
        with:
          key: apt-nasm-qemu-e2fsprogs-${{ runner.os }}
          path: ~/apt-cache
      - name: Install build dependencies
        if: needs.changes.outputs.docs_only != 'true' && matrix.suite != 'test_cc_compatibility' && matrix.suite != 'test_kernel_archive'
        run: |
          sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          sudo apt-get update && sudo apt-get install -y e2fsprogs nasm qemu-system-x86
          mkdir -p ~/apt-cache && cp /var/cache/apt/archives/*.deb ~/apt-cache/
      - name: Install pytest
        if: needs.changes.outputs.docs_only != 'true' && matrix.suite == 'test_unit'
        run: pip install pytest
      - name: Run ${{ matrix.suite }}
        if: needs.changes.outputs.docs_only != 'true'
        run: ${{ matrix.command }}
    strategy:
      fail-fast: false
      matrix:
        # The two longest jobs (test_programs_ext2 and test_programs_bbfs, both
        # running with --slow) lead the matrix so they start dispatching ahead
        # of the shorter ones.
        include:
          - suite: test_programs_ext2
            command: python3 tests/test_programs.py --filesystem ext2 --slow
          - suite: test_programs_bbfs
            command: python3 tests/test_programs.py --slow
          - suite: test_archive
            command: python3 tests/test_archive.py
          - suite: test_asm
            command: python3 tests/test_asm.py
          - suite: test_bboefs
            command: python3 tests/test_bboefs.py
          - suite: test_cc_bits
            command: python3 tests/test_cc_bits.py
          - suite: test_cc_compatibility
            command: python3 tests/test_cc_compatibility.py
          - suite: test_draw
            command: python3 tests/test_draw.py
          - suite: test_floppy_boot
            command: python3 tests/test_floppy_boot.py
          - suite: test_kernel_archive
            command: python3 tests/test_kernel_archive.py
          - suite: test_programs_floppy
            command: python3 tests/test_programs.py --floppy
          - suite: test_ps2
            command: python3 tests/test_ps2.py
          - suite: test_unit
            command: python3 -m pytest tests/unit/
