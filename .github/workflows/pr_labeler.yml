name: pr_labeler

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const match = title.match(/^(feat|feature|fix|docs|ci|chore|build)(\([^)]*\))?!?:/i);
            const map = {
              feat: 'enhancement',
              feature: 'enhancement',
              fix: 'bug',
              docs: 'documentation',
              ci: 'ci',
              chore: 'ci',
              build: 'ci',
            };
            if (!match) {
              core.info(`PR title "${title}" has no recognised prefix; skipping.`);
              return;
            }
            const label = map[match[1].toLowerCase()];
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });
            core.info(`Applied label "${label}".`);
